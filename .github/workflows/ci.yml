name: ci

on:
  workflow_dispatch:
    inputs:
      cmake_build_type:
        description: "The CMake build type to use"
        type: choice
        required: true
        default: Release
        options:
          - Release
          - Debug
          - RelWithDebInfo
  push:

env:
  CMAKE_BUILD_TYPE: ${{ github.event.inputs.cmake_build_type || 'Release' }}
  GITHUB_IMAGE_NAME: 851725450642.dkr.ecr.us-west-2.amazonaws.com/gizmosql
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  build-project-linux:
    name: Build Project - Linux
    strategy:
      matrix:
        include:
          - platform: arm64
            os: linux
            runner: codebuild-gizmosql-build-runner-arm-${{ github.run_id }}-${{ github.run_attempt }}
    runs-on: ${{ matrix.runner }}
    env:
      zip_file_name: gizmosql_cli_${{ matrix.os }}_${{ matrix.platform }}.zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build requirements
        run: |
          export DEBIAN_FRONTEND=noninteractive
          export APT_LISTCHANGES_FRONTEND=none

          # If running on arm64, start docker daemon
          if [ "${{ matrix.platform }}" = "arm64" ]; then
            sudo mkdir -p /sys/fs/cgroup/docker
            nohup /usr/bin/dockerd --host=unix:///var/run/docker.sock --host=tcp://127.0.0.1:2375 > /dev/null 2>&1 &
            timeout 30 sh -c "until docker info; do echo .; sleep 1; done"
            docker --version
          fi

          sudo -E apt-get update
          sudo -E apt-get install -y -o Dpkg::Use-Pty=0 \
            libcurl4-openssl-dev \
            postgresql \
            postgresql-client

          docker buildx create --use --name mybuilder --driver docker-container
          aws --version
      
      - name: get caller identity2
        run: |
          aws ecr get-login-password --region us-west-2 | docker login --username AWS --password-stdin 851725450642.dkr.ecr.us-west-2.amazonaws.com

      - name: Configure Project
        uses: threeal/cmake-action@v2.1.0
        with:
          generator: Ninja
          run-build: true
          options: |
            CMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }}
            GIZMOSQL_ENTERPRISE=ON
            WITH_OPENTELEMETRY=ON

      - name: Start PostgreSQL test services
        run: |
          PG_VERSION=$(ls /etc/postgresql | sort -V | tail -n1)

          sudo pg_ctlcluster "$PG_VERSION" main start

          if ! pg_lsclusters | awk '{print $1":"$2}' | grep -q "^${PG_VERSION}:instrumentation$"; then
            sudo pg_createcluster "$PG_VERSION" instrumentation --start -p 5433 -- --auth-local=peer --auth-host=scram-sha-256
          else
            sudo pg_ctlcluster "$PG_VERSION" instrumentation start
          fi

          for port in 5432 5433; do
            for i in $(seq 1 30); do
              pg_isready -h localhost -p "$port" -U postgres && break
              echo "Waiting for PostgreSQL on port $port... (attempt $i)"
              sleep 2
            done
            pg_isready -h localhost -p "$port" -U postgres
          done

          sudo -u postgres psql -p 5432 -c "ALTER USER postgres PASSWORD 'testpassword';"
          if ! sudo -u postgres psql -p 5432 -tAc "SELECT 1 FROM pg_database WHERE datname = 'ducklake_catalog'" | grep -q 1; then
            sudo -u postgres createdb -p 5432 ducklake_catalog
          fi

          sudo -u postgres psql -p 5433 -c "ALTER USER postgres PASSWORD 'testpassword';"
          if ! sudo -u postgres psql -p 5433 -tAc "SELECT 1 FROM pg_database WHERE datname = 'instrumentation_catalog'" | grep -q 1; then
            sudo -u postgres createdb -p 5433 instrumentation_catalog
          fi

      - name: Start MinIO and setup bucket
        run: |
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then
            BIN_ARCH="arm64"
          else
            BIN_ARCH="amd64"
          fi

          curl -sL "https://dl.min.io/server/minio/release/linux-${BIN_ARCH}/minio" -o /tmp/minio
          curl -sL "https://dl.min.io/client/mc/release/linux-${BIN_ARCH}/mc" -o /tmp/mc
          chmod +x /tmp/minio
          chmod +x /tmp/mc

          mkdir -p /tmp/minio-data
          nohup env MINIO_ROOT_USER=minioadmin MINIO_ROOT_PASSWORD=minioadmin \
            /tmp/minio server /tmp/minio-data --console-address ":9001" \
            >/tmp/minio.log 2>&1 &

          for i in $(seq 1 30); do
            /tmp/mc alias set myminio http://localhost:9000 minioadmin minioadmin && break
            echo "Waiting for MinIO to be ready... (attempt $i)"
            sleep 2
          done

          /tmp/mc alias set myminio http://localhost:9000 minioadmin minioadmin

          /tmp/mc mb --ignore-existing myminio/instrumentation

      - name: Run Tests (Core Edition - No License)
        run: |
          ./build/tests/gizmosql_integration_tests

      - name: Setup Enterprise License
        env:
          GIZMOSQL_LICENSE_KEY: ${{ secrets.GIZMOSQL_LICENSE_KEY }}
        if: env.GIZMOSQL_LICENSE_KEY != ''
        run: |
          echo "$GIZMOSQL_LICENSE_KEY" > /tmp/gizmosql_license.jwt
          echo "GIZMOSQL_LICENSE_KEY_FILE=/tmp/gizmosql_license.jwt" >> $GITHUB_ENV

      - name: Run Tests (Enterprise Edition - With License)
        env:
          GIZMOSQL_LICENSE_KEY: ${{ secrets.GIZMOSQL_LICENSE_KEY }}
        if: env.GIZMOSQL_LICENSE_KEY != ''
        run: |
          ./build/tests/gizmosql_integration_tests
      
      - name: Zip artifacts
        run: |
          mv build/gizmosql_server build/gizmosql_client .
          zip -j ${{ env.zip_file_name }} gizmosql_server gizmosql_client

      - name: Build and push full Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/${{ matrix.platform }}
          file: Dockerfile.ci
          push: true
          tags: |
            ${{ env.GITHUB_IMAGE_NAME }}:${{ github.sha }}
          no-cache: true
          provenance: false
